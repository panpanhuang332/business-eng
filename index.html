<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商用英語必備教材</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Serif+Display&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2230;
    --border: #2a3447;
    --gold: #c9a84c;
    --gold-light: #e8c87a;
    --gold-dim: rgba(201,168,76,0.15);
    --text: #e6edf3;
    --text-dim: #8b9ab0;
    --text-muted: #4a5568;
    --accent: #4a9eff;
    --accent-dim: rgba(74,158,255,0.12);
    --green: #3fb950;
    --red: #f85149;
    --red-dim: rgba(248,81,73,0.12);
    --green-dim: rgba(63,185,80,0.12);
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Source Serif 4', Georgia, serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.7;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, #0a0e14 0%, #12192a 60%, #0d1525 100%);
    border-bottom: 1px solid var(--border);
    padding: 2rem 2rem 0;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }

  .header-top {
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .logo-mark {
    width: 44px; height: 44px;
    border: 2px solid var(--gold);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    color: var(--gold);
    flex-shrink: 0;
    margin-top: 4px;
  }

  .header-text h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.3rem, 3vw, 1.9rem);
    font-weight: 900;
    color: var(--text);
    letter-spacing: -0.02em;
    line-height: 1.2;
  }

  .header-text h1 span { color: var(--gold); }

  .header-text p {
    font-size: 0.82rem;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    margin-top: 0.25rem;
    letter-spacing: 0.05em;
  }

  /* ── NAV TABS ── */
  nav {
    display: flex;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  nav::-webkit-scrollbar { display: none; }

  .tab-btn {
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    color: var(--text-dim);
    font-family: 'Source Serif 4', serif;
    font-size: 0.92rem;
    padding: 0.65rem 1.3rem;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    position: relative;
  }

  .tab-btn:hover { color: var(--text); }

  .tab-btn.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }

  .tab-badge {
    display: inline-block;
    background: var(--gold-dim);
    color: var(--gold);
    font-size: 0.68rem;
    font-family: 'JetBrains Mono', monospace;
    padding: 0.1rem 0.4rem;
    border-radius: 20px;
    margin-left: 0.4rem;
    vertical-align: middle;
  }

  /* ── MAIN ── */
  main {
    max-width: 920px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; animation: fadeIn 0.3s ease; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── SECTION TITLE ── */
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    color: var(--text);
    margin-bottom: 0.4rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, var(--border), transparent);
  }

  .section-desc {
    font-size: 0.88rem;
    color: var(--text-dim);
    margin-bottom: 2rem;
  }

  /* ── VOCAB CARDS ── */
  .vocab-grid {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .vocab-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 1.5rem;
    display: grid;
    grid-template-columns: 2rem 1fr 1fr;
    gap: 0.75rem 1.25rem;
    align-items: start;
    transition: border-color 0.2s, box-shadow 0.2s;
    position: relative;
  }

  .vocab-card:hover {
    border-color: var(--gold);
    box-shadow: 0 0 0 1px var(--gold-dim), 0 4px 24px rgba(0,0,0,0.3);
  }

  .vocab-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    color: var(--text-muted);
    padding-top: 0.3rem;
    text-align: right;
  }

  .vocab-informal {
    display: flex;
    flex-direction: column;
  }

  .vocab-informal .label {
    font-size: 0.68rem;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 0.25rem;
  }

  .vocab-word-informal {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text-dim);
  }

  .vocab-zh {
    font-size: 0.82rem;
    color: var(--text-muted);
    margin-top: 0.1rem;
  }

  .vocab-formal {
    display: flex;
    flex-direction: column;
  }

  .vocab-formal .label {
    font-size: 0.68rem;
    font-family: 'JetBrains Mono', monospace;
    color: var(--gold);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 0.25rem;
  }

  .vocab-word-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .vocab-word-formal {
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--gold-light);
    font-family: 'DM Serif Display', serif;
  }

  .kk {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    color: var(--text-dim);
    background: var(--surface2);
    padding: 0.1rem 0.5rem;
    border-radius: 4px;
    border: 1px solid var(--border);
  }

  .speak-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--accent);
    cursor: pointer;
    width: 28px; height: 28px;
    display: inline-flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .speak-btn:hover {
    background: var(--accent-dim);
    border-color: var(--accent);
  }

  .speak-btn svg { width: 14px; height: 14px; }

  .vocab-example {
    grid-column: 2 / -1;
    font-size: 0.88rem;
    color: var(--text-dim);
    border-left: 2px solid var(--border);
    padding-left: 0.75rem;
    font-style: italic;
    line-height: 1.6;
    margin-top: 0.25rem;
  }

  .vocab-example .en { color: var(--text); font-style: italic; }
  .vocab-example .zh { color: var(--text-muted); font-style: normal; font-size: 0.82rem; }

  /* Arrow between informal → formal */
  .arrow-cell {
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--gold);
    font-size: 1rem;
    padding-top: 1.2rem;
  }

  /* ── PHRASES ── */
  .phrase-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-bottom: 1.25rem;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .phrase-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(to bottom, var(--gold), transparent);
  }

  .phrase-card:hover { border-color: var(--gold); }

  .phrase-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
    letter-spacing: 0.08em;
  }

  .phrase-en {
    font-family: 'DM Serif Display', serif;
    font-size: 1.35rem;
    color: var(--gold-light);
    margin-bottom: 0.35rem;
  }

  .phrase-zh {
    font-size: 0.88rem;
    color: var(--gold);
    margin-bottom: 0.9rem;
    font-family: 'JetBrains Mono', monospace;
  }

  .phrase-def {
    background: var(--surface2);
    border-radius: 8px;
    padding: 0.9rem 1rem;
    font-size: 0.9rem;
    margin-bottom: 0.9rem;
    border: 1px solid var(--border);
  }

  .phrase-def .def-en { color: var(--text); margin-bottom: 0.25rem; }
  .phrase-def .def-zh { color: var(--text-muted); font-size: 0.83rem; }

  .phrase-example {
    font-style: italic;
    font-size: 0.9rem;
    color: var(--text-dim);
    border-left: 2px solid var(--gold-dim);
    padding-left: 0.75rem;
  }

  .phrase-example .en { color: var(--text); }
  .phrase-example .zh { color: var(--text-muted); font-style: normal; font-size: 0.82rem; margin-top: 0.15rem; }

  /* ── SENTENCES ── */
  .sent-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0 0.6rem;
    font-size: 0.9rem;
  }

  .sent-table th {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-align: left;
    padding: 0 1rem 0.5rem;
    border-bottom: 1px solid var(--border);
  }

  .sent-table td {
    background: var(--surface);
    padding: 0.9rem 1rem;
    vertical-align: top;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }

  .sent-table td:first-child {
    border-left: 1px solid var(--border);
    border-radius: var(--radius) 0 0 var(--radius);
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    width: 2.5rem;
    text-align: center;
  }

  .sent-table td:last-child {
    border-right: 1px solid var(--border);
    border-radius: 0 var(--radius) var(--radius) 0;
    color: var(--text-muted);
    font-size: 0.83rem;
  }

  .sent-en { color: var(--text); font-style: italic; margin-bottom: 0.25rem; }
  .sent-zh { color: var(--text-muted); font-size: 0.82rem; }
  .sent-key { color: var(--gold-light); font-style: normal; font-weight: 600; }

  /* ── QUIZ ── */
  .quiz-header {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .quiz-stats {
    display: flex;
    gap: 1.5rem;
  }

  .stat {
    text-align: center;
  }

  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
  }

  .stat-label {
    font-size: 0.72rem;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-top: 0.2rem;
  }

  .quiz-actions {
    display: flex;
    gap: 0.75rem;
  }

  .btn {
    padding: 0.5rem 1.1rem;
    border-radius: 8px;
    font-size: 0.85rem;
    cursor: pointer;
    font-family: 'Source Serif 4', serif;
    transition: all 0.15s;
    border: none;
  }

  .btn-gold {
    background: var(--gold);
    color: #0d1117;
    font-weight: 600;
  }

  .btn-gold:hover { background: var(--gold-light); }

  .btn-outline {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
  }

  .btn-outline:hover { border-color: var(--gold); color: var(--gold); }

  /* progress bar */
  .quiz-progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 2rem;
    overflow: hidden;
  }

  .quiz-progress-fill {
    height: 100%;
    background: linear-gradient(to right, var(--gold), var(--gold-light));
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .question-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-bottom: 1.25rem;
    transition: border-color 0.2s;
  }

  .question-block.answered { border-color: var(--border); }
  .question-block.correct { border-color: var(--green); background: linear-gradient(135deg, var(--surface), #0d1f12); }
  .question-block.incorrect { border-color: var(--red); background: linear-gradient(135deg, var(--surface), #1f0d0d); }

  .q-meta {
    display: flex;
    gap: 0.75rem;
    align-items: center;
    margin-bottom: 0.75rem;
  }

  .q-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-muted);
    background: var(--surface2);
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    border: 1px solid var(--border);
  }

  .q-category {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--gold);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .q-text {
    font-size: 1rem;
    color: var(--text);
    margin-bottom: 1rem;
    line-height: 1.6;
  }

  .q-text em {
    font-style: normal;
    color: var(--gold-light);
    font-weight: 600;
    text-decoration: underline;
    text-decoration-color: var(--gold-dim);
  }

  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.6rem;
  }

  @media (max-width: 560px) {
    .options { grid-template-columns: 1fr; }
    .vocab-card { grid-template-columns: 1.5rem 1fr; }
    .vocab-card .vocab-formal { grid-column: 2; }
  }

  .option-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Source Serif 4', serif;
    font-size: 0.88rem;
    padding: 0.65rem 1rem;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .option-btn:hover:not(:disabled) {
    border-color: var(--gold);
    background: var(--gold-dim);
    color: var(--gold-light);
  }

  .option-btn:disabled { cursor: default; }

  .option-btn.correct-ans {
    border-color: var(--green);
    background: var(--green-dim);
    color: #7ee89a;
  }

  .option-btn.wrong-ans {
    border-color: var(--red);
    background: var(--red-dim);
    color: #fc8580;
  }

  .option-letter {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-muted);
    background: var(--border);
    width: 20px; height: 20px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 4px;
    flex-shrink: 0;
  }

  .option-btn.correct-ans .option-letter { background: rgba(63,185,80,0.3); color: #7ee89a; }
  .option-btn.wrong-ans .option-letter { background: rgba(248,81,73,0.3); color: #fc8580; }

  .q-feedback {
    margin-top: 0.75rem;
    font-size: 0.85rem;
    padding: 0.6rem 0.9rem;
    border-radius: 8px;
    display: none;
    align-items: flex-start;
    gap: 0.5rem;
  }

  .q-feedback.show { display: flex; }
  .q-feedback.correct { background: var(--green-dim); color: #7ee89a; border: 1px solid rgba(63,185,80,0.3); }
  .q-feedback.incorrect { background: var(--red-dim); color: #fc8580; border: 1px solid rgba(248,81,73,0.3); }

  /* result panel */
  .result-panel {
    display: none;
    background: var(--surface);
    border: 1px solid var(--gold);
    border-radius: var(--radius);
    padding: 2rem;
    text-align: center;
    margin-bottom: 2rem;
    animation: fadeIn 0.4s ease;
  }

  .result-panel.show { display: block; }

  .result-score {
    font-family: 'Playfair Display', serif;
    font-size: 4rem;
    font-weight: 900;
    color: var(--gold);
    line-height: 1;
    margin: 0.5rem 0;
  }

  .result-label { color: var(--text-dim); font-size: 0.9rem; }
  .result-grade {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    padding: 0.35rem 1rem;
    border-radius: 20px;
    margin-top: 1rem;
  }

  .grade-a { background: var(--green-dim); color: #7ee89a; }
  .grade-b { background: var(--gold-dim); color: var(--gold); }
  .grade-c { background: var(--red-dim); color: #fc8580; }

  /* speak icon SVG */
  .icon-speak { display: inline-block; }

  /* scrollbar styling */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo-mark">BE</div>
    <div class="header-text">
      <h1>商用英語 <span>必備教材</span></h1>
      <p>Business English · Vocabulary · Phrases · Quiz</p>
    </div>
  </div>
  <nav>
    <button class="tab-btn active" onclick="switchTab('vocab')">📘 單字 <span class="tab-badge">10</span></button>
    <button class="tab-btn" onclick="switchTab('phrases')">💼 片語 <span class="tab-badge">4</span></button>
    <button class="tab-btn" onclick="switchTab('sentences')">✍️ 例句 <span class="tab-badge">14</span></button>
    <button class="tab-btn" onclick="switchTab('quiz')">🎯 測驗 <span class="tab-badge">30題</span></button>
  </nav>
</header>

<main>

<!-- ═══════════════ TAB 1: VOCAB ═══════════════ -->
<div id="tab-vocab" class="tab-panel active">
  <h2 class="section-title">單字對照</h2>
  <p class="section-desc">口語 → 正式商務用語對照；超出基礎程度的單字附有 KK 音標與🔊發音</p>

  <div class="vocab-grid" id="vocab-container"></div>
</div>

<!-- ═══════════════ TAB 2: PHRASES ═══════════════ -->
<div id="tab-phrases" class="tab-panel">
  <h2 class="section-title">商用慣用片語</h2>
  <p class="section-desc">四組常見商用英語慣用語，含定義、中文解釋與例句</p>
  <div id="phrases-container"></div>
</div>

<!-- ═══════════════ TAB 3: SENTENCES ═══════════════ -->
<div id="tab-sentences" class="tab-panel">
  <h2 class="section-title">例句彙整</h2>
  <p class="section-desc">所有單字與片語的例句，關鍵詞彙以金色標示</p>
  <table class="sent-table">
    <thead>
      <tr>
        <th>#</th>
        <th>英文例句</th>
        <th>中文翻譯</th>
      </tr>
    </thead>
    <tbody id="sent-tbody"></tbody>
  </table>
</div>

<!-- ═══════════════ TAB 4: QUIZ ═══════════════ -->
<div id="tab-quiz" class="tab-panel">
  <h2 class="section-title">選擇題測驗</h2>
  <p class="section-desc">共 30 題，涵蓋單字、片語、例句克漏字與語義理解</p>

  <div class="quiz-header">
    <div class="quiz-stats">
      <div class="stat">
        <div class="stat-num" id="stat-answered">0</div>
        <div class="stat-label">已作答</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="stat-correct">0</div>
        <div class="stat-label">答對</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="stat-score">—</div>
        <div class="stat-label">分數</div>
      </div>
    </div>
    <div class="quiz-actions">
      <button class="btn btn-gold" onclick="submitQuiz()">繳交測驗</button>
      <button class="btn btn-outline" onclick="resetQuiz()">重新作答</button>
    </div>
  </div>

  <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="progress-fill" style="width:0%"></div></div>

  <div class="result-panel" id="result-panel">
    <div class="result-label">您的成績</div>
    <div class="result-score" id="result-score">0 / 30</div>
    <div class="result-label" id="result-pct"></div>
    <div class="result-grade" id="result-grade"></div>
  </div>

function speakerIcon() {
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>`;

function speak(word) {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(word);
    utt.lang = 'en-US';
    utt.rate = 0.85;
    window.speechSynthesis.speak(utt);
  }
}

// ── QUIZ ──────────────────────────────────────────────────────────────────
const userAnswers = new Array(questions.length).fill(null);
let submitted = false;

function buildQuiz() {
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';
  questions.forEach((q, qi) => {
    const block = document.createElement('div');
    block.className = 'question-block';
    block.id = `q-${qi}`;

    const letters = ['A', 'B', 'C', 'D'];
    const optsHTML = q.opts.map((opt, oi) => `
      <button class="option-btn" id="opt-${qi}-${oi}" onclick="selectAnswer(${qi}, ${oi})">
        <span class="option-letter">${letters[oi]}</span>${opt}
      </button>
    `).join('');

    block.innerHTML = `
      <div class="q-meta">
        <span class="q-num">Q${String(qi+1).padStart(2,'0')}</span>
        <span class="q-category">${q.cat}</span>
      </div>
      <div class="q-text">${q.q}</div>
      <div class="options">${optsHTML}</div>
      <div class="q-feedback" id="fb-${qi}"></div>
    `;
    container.appendChild(block);
  });
  updateStats();
}

function selectAnswer(qi, oi) {
  if (submitted) return;
  if (userAnswers[qi] !== null) return; // already answered

  userAnswers[qi] = oi;
  const letters = ['A','B','C','D'];
  questions[qi].opts.forEach((_, i) => {
    const btn = document.getElementById(`opt-${qi}-${i}`);
    btn.disabled = true;
    if (i === questions[qi].ans) btn.classList.add('correct-ans');
    if (i === oi && i !== questions[qi].ans) btn.classList.add('wrong-ans');
  });

  const fb = document.getElementById(`fb-${qi}`);
  if (oi === questions[qi].ans) {
    fb.className = 'q-feedback correct show';
    fb.innerHTML = `✓ 正確！${questions[qi].exp}`;
  } else {
    fb.className = 'q-feedback incorrect show';
    fb.innerHTML = `✗ 答案是 ${letters[questions[qi].ans]}. ${questions[qi].exp}`;
  }

  updateStats();
}

function updateStats() {
  const answered = userAnswers.filter(a => a !== null).length;
  const correct = userAnswers.filter((a, i) => a === questions[i].ans).length;
  document.getElementById('stat-answered').textContent = answered;
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-score').textContent = answered > 0 ? Math.round(correct/answered*100)+'%' : '—';
  document.getElementById('progress-fill').style.width = (answered / questions.length * 100) + '%';
}

function submitQuiz() {
  submitted = true;
  const answered = userAnswers.filter(a => a !== null).length;
  const correct = userAnswers.filter((a, i) => a === questions[i].ans).length;
  const pct = Math.round(correct / questions.length * 100);

  const panel = document.getElementById('result-panel');
  panel.classList.add('show');
  document.getElementById('result-score').textContent = `${correct} / ${questions.length}`;
  document.getElementById('result-pct').textContent = `正確率 ${pct}%`;

  const gradeEl = document.getElementById('result-grade');
  if (pct >= 80) { gradeEl.textContent = '🏆 優秀 Excellent'; gradeEl.className = 'result-grade grade-a'; }
  else if (pct >= 60) { gradeEl.textContent = '👍 良好 Good'; gradeEl.className = 'result-grade grade-b'; }
  else { gradeEl.textContent = '📚 繼續加油 Keep Studying'; gradeEl.className = 'result-grade grade-c'; }

  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });

  // mark unanswered
  questions.forEach((q, qi) => {
    if (userAnswers[qi] === null) {
      const block = document.getElementById(`q-${qi}`);
      q.opts.forEach((_, i) => {
        const btn = document.getElementById(`opt-${qi}-${i}`);
        btn.disabled = true;
        if (i === q.ans) btn.classList.add('correct-ans');
      });
      const fb = document.getElementById(`fb-${qi}`);
      fb.className = 'q-feedback incorrect show';
      fb.innerHTML = `— 未作答。正確答案：${'ABCD'[q.ans]}. ${q.exp}`;
    }
  });
  updateStats();
}

function resetQuiz() {
  submitted = false;
  userAnswers.fill(null);
  document.getElementById('result-panel').classList.remove('show');
  buildQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── TAB SWITCHING ────────────────────────────────────────────────────────
function switchTab(id) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  event.currentTarget.classList.add('active');
}

// ── INIT ─────────────────────────────────────────────────────────────────
buildQuiz();
</script>
</body>
</html>
